# =====================================================================
# Kinder Stick OS — question_bank.yaml
# 단일 진실원천 (Single Source of Truth) for 14-도메인 진단 프레임워크
#
# 구조: domains[] → groups[] → sub_items[]
# 빌드 타임에 Next.js가 이 YAML을 import하여 진단 UI/점수 산식/AI 코치 입력으로 사용.
#
# 본 파일은 풀 구조 + 도메인당 3-5개 worked sub-item 예시(총 ~55개)를 담는다.
# 나머지 ~155개 sub-item은 동일 스키마로 확장. 가장 먼저 채워야 하는 항목은
# tier=critical이며, MVP(Phase 2)는 critical 항목만으로도 작동 가능.
# =====================================================================

version: "1.0.0"
updated: "2026-05-07"
locale: "ko-KR"

# ---------------------------------------------------------------------
# 제품 출시 단계별 베이지안 prior — 한국 영유아 EdTech 운영 맥락
# ---------------------------------------------------------------------
priors:
  closed_beta: { failure_6m: 0.30, failure_12m: 0.50 }
  open_beta:   { failure_6m: 0.22, failure_12m: 0.40 }
  ga_early:    { failure_6m: 0.15, failure_12m: 0.28 }
  ga_growth:   { failure_6m: 0.08, failure_12m: 0.18 }
  ga_scale:    { failure_6m: 0.04, failure_12m: 0.10 }

# ---------------------------------------------------------------------
# Critical 도메인이 빨강일 때 베이지안 odds에 곱하는 likelihood ratio
# A5(자금성 단위경제) 와 A12(자금·런웨이·IR) 는 본 서비스 범위 밖이라 제거
# ---------------------------------------------------------------------
likelihood_ratios:
  A2:  3.5   # PMF
  A7:  3.0   # 한국 EdTech 규제 (KISA·누리·평가제 빨강 = 영업정지 리스크)
  A11: 2.6   # 팀 붕괴
  A1:  2.0   # 시장 부재
  A3:  1.8   # 결정자(교사) ROI 신호 부재
  A4:  1.7   # 활성화/유지 실패

# ---------------------------------------------------------------------
# Critical-Critical: 단독으로도 6개월 실패확률 minimum 강제
# ---------------------------------------------------------------------
critical_caps:
  - { sub_item: A2.SE.40,              condition: "evidence.v <= 2 AND stage IN [open_beta, ga_early]",   min_p_6m: 0.35 }
  - { sub_item: A2.RET.M3,             condition: "evidence.v == 1",                                      min_p_6m: 0.35 }
  - { sub_item: A11.FOUNDERS.ALIGN,    condition: "evidence.v <= 2",                                      min_p_6m: 0.35 }
  - { sub_item: A11.RUN.STAY,          condition: "evidence.v <= 2",                                      min_p_6m: 0.25 }
  - { sub_item: A7.KISA.SELFCHECK,     condition: "evidence.v == 1",                                      min_p_6m: 0.40 }
  - { sub_item: A7.PII.INCIDENT,       condition: "evidence.v >= 2",                                      min_p_6m: 0.60 }
  - { sub_item: A3.BUYER.WTP,          condition: "evidence.v == 1 AND stage IN [open_beta, ga_early]",   min_p_6m: 0.45 }
  - { sub_item: A4.ACT.D1,             condition: "evidence.v == 1",                                      min_p_6m: 0.25 }
  - { sub_item: A1.JTBD.URGENCY,       condition: "evidence.v == 1",                                      min_p_6m: 0.30 }
  - { sub_item: A14.WIN.RATE,          condition: "evidence.v == 1 AND has_active_competitive_deals",     min_p_6m: 0.25 }

# =====================================================================
# DOMAINS (14개)
# =====================================================================
domains:

# ---------------------------------------------------------------------
- code: A1
  name_ko: "시장-문제 적합성"
  name_en: "Problem-Market Fit"
  tier: critical
  weight: 9
  owner_role: ["Founder", "PM"]
  framework: "Christensen JTBD · Push of Situation · The Mom Test"
  thresholds: { red: 40, yellow: 60, green: 75 }
  groups:
    - code: A1.JTBD
      name: "Jobs-to-be-Done 정의"
      sub_items:
        - code: A1.JTBD.URGENCY
          tier: critical
          weight_within_group: 0.5
          belief:
            q: "교사 인터뷰에서 이 문제를 'urgent(급하다)'로 분류한 비율이 50% 이상이다."
            anchors: ["전혀 아니다", "10–20%", "20–35%", "35–50%", "50% 이상"]
            help: "Important과 Urgent는 다르다. Urgent만 지갑을 연다."
          evidence:
            q: "최근 6개월 인터뷰에서 'urgent' 분류된 응답자 비율"
            type: choice
            options:
              - { v: 1, label: "측정 안 함 또는 < 10%" }
              - { v: 2, label: "10–24%" }
              - { v: 3, label: "25–39%" }
              - { v: 4, label: "40–54%" }
              - { v: 5, label: "≥ 55%" }
            kpi_source: "internal:interview_log (CRM 또는 Notion DB의 분류 태그)"
            refresh_period_days: 90
          citation: "Christensen *Competing Against Luck* (2016); Fitzpatrick *The Mom Test* (2013)"
          failure_trigger: "evidence.v <= 2"
          cadence: quarterly
          data_quality_required: 2
        - code: A1.JTBD.LANG
          tier: critical
          weight_within_group: 0.3
          belief:
            q: "교사 인터뷰 10명 중 8명 이상이 '동일한' 고통을 동일한 언어로 말했다."
            anchors: ["서로 다른 단어", "비슷한 주제·다른 단어", "절반 정도 일치", "70% 일치", "8/10 동일 표현"]
          evidence:
            q: "최근 인터뷰 노트에서 동일 표현이 반복된 빈도"
            type: choice
            options:
              - { v: 1, label: "분석 안 함" }
              - { v: 2, label: "1–2회 반복" }
              - { v: 3, label: "3–5회" }
              - { v: 4, label: "6–8회" }
              - { v: 5, label: "9회 이상 (8/10 일치)" }
          citation: "Mom Test §2 'Look for specific painful examples'"
          failure_trigger: "evidence.v <= 2"
          cadence: quarterly
        - code: A1.JTBD.PUSH
          tier: important
          weight_within_group: 0.2
          belief:
            q: "사용자가 '이 문제를 풀기 위해 직전에 시도한 것'이 무엇인지 5명 이상에게서 들었다."
            anchors: ["듣지 못함", "1–2명", "3–4명", "5–6명", "7명 이상"]
          evidence:
            q: "Push-Pull-Anxiety-Habit 분석을 한 인터뷰 수"
            type: choice
            options:
              - { v: 1, label: "0건" }
              - { v: 2, label: "1–2건" }
              - { v: 3, label: "3–5건" }
              - { v: 4, label: "6–10건" }
              - { v: 5, label: "≥ 11건" }
          citation: "Re:Wired Group 'Forces of Progress' (Spiek/Moesta)"
          failure_trigger: "evidence.v <= 2"
          cadence: quarterly
    - code: A1.SEG
      name: "타겟 세그먼트 명확성"
      sub_items:
        # (확장: A1.SEG.ICP, A1.SEG.SIZE, A1.SEG.WTP — 동일 스키마로 추가)

# ---------------------------------------------------------------------
- code: A2
  name_ko: "제품-시장 적합성 (PMF)"
  name_en: "Product-Market Fit"
  tier: critical
  weight: 13
  owner_role: ["Founder", "PM"]
  framework: "Sean Ellis 40% Rule · Balfour Four Fits · Vohra PMF Engine"
  thresholds: { red: 40, yellow: 60, green: 75 }
  groups:
    - code: A2.SE
      name: "Sean Ellis 40% Test"
      sub_items:
        - code: A2.SE.40
          tier: critical
          weight_within_group: 0.45
          belief:
            q: "지난 90일 안에 Sean Ellis 40% 테스트(n≥30)를 직접 돌리고 결과를 안다."
            anchors: ["테스트가 뭔지 모른다", "들어봤지만 안 돌렸다", "비공식 n<30으로 1회", "n≥30 1회 실시", "분기마다 추적"]
          evidence:
            q: "최근 Sean Ellis 테스트의 'Very Disappointed' 비율"
            type: choice
            options:
              - { v: 1, label: "< 15% 또는 미측정" }
              - { v: 2, label: "15–24%" }
              - { v: 3, label: "25–39%" }
              - { v: 4, label: "40–54%" }
              - { v: 5, label: "≥ 55%" }
            kpi_source: "Typeform/Tally pmf_survey, monthly cohort"
            refresh_period_days: 90
          citation: "Ellis 2009 (Superhuman 22→58%); OpenView 2025 PMF playbook; Vohra 'How Superhuman Built an Engine to Find Product-Market Fit' (First Round 2018)"
          failure_trigger: "evidence.v <= 2 AND stage IN [open_beta, ga_early]"
          cadence: quarterly
          data_quality_required: 2
    - code: A2.RET
      name: "Cohort Retention"
      sub_items:
        - code: A2.RET.M3
          tier: critical
          weight_within_group: 0.4
          belief:
            q: "가입 3개월 후에도 활성 상태인 교사 비율이 우리 핵심 KPI 보드에 매주 표시된다."
            anchors: ["측정 안 함", "분기 1회 본다", "월 1회", "주 1회", "실시간 대시보드"]
          evidence:
            q: "가장 최근 cohort의 M3 retention (가입 3개월 후 weekly active)"
            type: choice
            options:
              - { v: 1, label: "< 15%" }
              - { v: 2, label: "15–29%" }
              - { v: 3, label: "30–44%" }
              - { v: 4, label: "45–59%" }
              - { v: 5, label: "≥ 60%" }
            kpi_source: "Mixpanel/Amplitude: weekly active by signup_cohort, week=12"
            refresh_period_days: 30
          citation: "Balfour Four Fits; Lenny Rachitsky retention benchmarks (B2B SaaS top quartile M3 ≥ 45%)"
          failure_trigger: "evidence.v <= 2 OR retention_curve.slope_w8_w12 < -2"
          cadence: weekly
          data_quality_required: 3
    - code: A2.CORE
      name: "Core Segment 식별"
      sub_items:
        - code: A2.CORE.ICP
          tier: critical
          weight_within_group: 0.5
          belief:
            q: "우리는 '어떤 기관, 어떤 역할, 어떤 상황'에서 PMF를 찾았다고 한 문장으로 답할 수 있다."
            anchors: ["전혀", "추측 수준", "가설 있음", "데이터로 검증된 가설", "한 문장 명문화 + 분기 검증"]
          evidence:
            q: "ICP 정의 문서가 존재하고 90일 이내 갱신됐는가?"
            type: choice
            options:
              - { v: 1, label: "없음" }
              - { v: 2, label: "있지만 180일+ 미갱신" }
              - { v: 3, label: "있고 90–180일 내 갱신" }
              - { v: 4, label: "90일 이내, 인터뷰 기반" }
              - { v: 5, label: "분기 갱신 + cohort 분석 인용" }
          citation: "April Dunford *Obviously Awesome*; Balfour 'Market-Product Fit'"
          failure_trigger: "evidence.v <= 2"
          cadence: quarterly

# ---------------------------------------------------------------------
- code: A3
  name_ko: "결정자 ROI (교사)"
  name_en: "Teacher Buyer Economics"
  tier: critical
  weight: 9
  owner_role: ["Founder", "PM", "CS"]
  framework: "교사 시간 절약 측정 · NPS · Continuation Intent · 누리과정 평가제 부합"
  thresholds: { red: 40, yellow: 60, green: 75 }
  groups:
    - code: A3.BUYER
      name: "교사 결정자 사용 의사"
      sub_items:
        - code: A3.BUYER.WTP
          tier: critical
          weight_within_group: 0.4
          belief:
            q: "교사가 우리 서비스에서 가치 있다고 답한 1순위 효익(예: 알림장 작성 시간 N% 단축, 관찰 기록 자동화, 누리과정 자료 절약)을 한 문장으로 답할 수 있다."
            anchors: ["전혀", "추측", "가설 있음", "교사 인터뷰 5건으로 확인", "측정 가능한 시간 절약 수치로 정량 확인"]
          evidence:
            q: "현재 활성 사용 중인 교사 수 (지난 30일 사용)"
            type: choice
            options:
              - { v: 1, label: "0명" }
              - { v: 2, label: "1–9명" }
              - { v: 3, label: "10–49명" }
              - { v: 4, label: "50–199명" }
              - { v: 5, label: "≥ 200명" }
            kpi_source: "GA4·Mixpanel: monthly active teachers"
            refresh_period_days: 7
          citation: "Beverly Kaye stay-intent framework; 2019 개정 누리과정 평가제 지표"
          failure_trigger: "evidence.v == 1 AND stage IN [open_beta, ga_early]"
          cadence: weekly
          data_quality_required: 3
        - code: A3.BUYER.ROI
          tier: critical
          weight_within_group: 0.35
          belief:
            q: "교사가 우리를 계속 쓰는 ROI 산정식(예: 주당 시간 절약 × 시급 환산)을 한 페이지로 보여줄 수 있다."
          evidence:
            q: "교사 ROI 한 페이지 자료 최신 갱신일"
            type: choice
            options:
              - { v: 1, label: "없음" }
              - { v: 2, label: "있지만 180일+ 미갱신" }
              - { v: 3, label: "90–180일" }
              - { v: 4, label: "30–90일" }
              - { v: 5, label: "30일 이내, 교사 인터뷰 5건 이상 검증" }
          citation: "April Dunford 'Obviously Awesome' positioning framework"
          failure_trigger: "evidence.v <= 2"
          cadence: monthly

# ---------------------------------------------------------------------
- code: A4
  name_ko: "사용자 활성화·유지"
  name_en: "User Activation & Retention"
  tier: critical
  weight: 10
  owner_role: ["Product", "Growth"]
  framework: "Time-to-Value · Cohort Retention · Aha Moment"
  thresholds: { red: 40, yellow: 60, green: 75 }
  groups:
    - code: A4.ACT
      name: "Activation Funnel"
      sub_items:
        - code: A4.ACT.D1
          tier: critical
          weight_within_group: 0.5
          belief:
            q: "신규 가입자 중 D1(가입 다음날)에 핵심 액션을 한 비율을 매일 본다."
          evidence:
            q: "최근 30일 D1 activation rate"
            type: choice
            options:
              - { v: 1, label: "< 20% 또는 측정 안 함" }
              - { v: 2, label: "20–34%" }
              - { v: 3, label: "35–49%" }
              - { v: 4, label: "50–64%" }
              - { v: 5, label: "≥ 65%" }
            kpi_source: "Mixpanel/Amplitude: D1 activation funnel"
            refresh_period_days: 1
          citation: "Reforge Activation course; Andrew Chen 'leaky bucket'"
          failure_trigger: "evidence.v == 1"
          cadence: daily
          data_quality_required: 3
    - code: A4.HABIT
      name: "Habit Loop"
      sub_items:
        - code: A4.HABIT.WAU_MAU
          tier: important
          weight_within_group: 0.4
          belief:
            q: "WAU/MAU 비율이 우리 제품의 사용 습관을 보여준다."
          evidence:
            q: "WAU/MAU"
            type: choice
            options:
              - { v: 1, label: "< 20%" }
              - { v: 2, label: "20–34%" }
              - { v: 3, label: "35–49%" }
              - { v: 4, label: "50–64%" }
              - { v: 5, label: "≥ 65%" }
            kpi_source: "Mixpanel/Amplitude"
            refresh_period_days: 7
          citation: "Sequoia 'WAU/MAU as engagement metric'"
          failure_trigger: "evidence.v <= 2"
          cadence: weekly

# ---------------------------------------------------------------------
# A5 (자금·단위경제·수익성) 도메인은 본 서비스 범위 밖이라 제거됨.
# 교사 중심 EdTech 운영 진단에서는 자생력·매출 효율을 별도 도메인으로 다루지
# 않는다. CAC·매출 관련 task는 catalog.ts 에 유지되지만 도메인 점수에는
# 반영되지 않음 (가중치 0).

- code: A6
  name_ko: "획득 채널 (GTM)"
  name_en: "Acquisition & GTM"
  tier: important
  weight: 6
  owner_role: ["Growth Lead"]
  framework: "AARRR · Channel/Message Fit · Bullseye Framework"
  thresholds: { red: 35, yellow: 55, green: 70 }
  groups:
    - code: A6.CHANNEL
      name: "반복 가능한 채널"
      sub_items:
        - code: A6.CHANNEL.REPEAT
          tier: critical
          weight_within_group: 0.5
          belief:
            q: "동일한 방식으로 다음 달에도 신규 고객을 만들 수 있는 채널이 2개 이상 있다."
          evidence:
            q: "월 신규 고객의 50%+를 만들어내는 채널 수 (반복 가능한)"
            type: choice
            options:
              - { v: 1, label: "0개 (매번 새로 발명)" }
              - { v: 2, label: "1개" }
              - { v: 3, label: "2개" }
              - { v: 4, label: "3개" }
              - { v: 5, label: "≥ 4개" }
            kpi_source: "GA4 + CRM source attribution"
            refresh_period_days: 7
          citation: "Weinberg & Mares *Traction*; First Round 'How to Find Your Channel'"
          failure_trigger: "evidence.v <= 2"
          cadence: weekly

# ---------------------------------------------------------------------
- code: A7
  name_ko: "신뢰·안전·규제"
  name_en: "Trust, Safety & Compliance"
  tier: critical
  weight: 8
  owner_role: ["CTO", "CPO", "법무"]
  framework: "KISA ISMS-P · 개인정보보호법 22조의2 · 누리과정 2019 개정 · 어린이집 평가제"
  thresholds: { red: 40, yellow: 65, green: 80 }
  notes: "EdTech에서 한 번의 사고가 회사를 죽인다. 한국 영유아 데이터는 일반보다 강한 보호 의무."
  groups:
    - code: A7.KISA
      name: "KISA / 개인정보 자기점검"
      sub_items:
        - code: A7.KISA.SELFCHECK
          tier: critical
          weight_within_group: 0.4
          belief:
            q: "KISA 정보보호 자기점검을 6개월 이내에 완료하고 미흡 항목을 패치했다."
          evidence:
            q: "KISA 자기점검 최근 결과 (만점 100)"
            type: choice
            options:
              - { v: 1, label: "안 함" }
              - { v: 2, label: "< 60" }
              - { v: 3, label: "60–74" }
              - { v: 4, label: "75–89" }
              - { v: 5, label: "≥ 90" }
            refresh_period_days: 180
          citation: "KISA ISMS-P 자기점검 기준; 개인정보보호법 22조의2 (만 14세 미만 동의)"
          failure_trigger: "evidence.v <= 2"
          cadence: semi_annual
        - code: A7.PII.INCIDENT
          tier: critical
          weight_within_group: 0.3
          belief:
            q: "최근 12개월 동안 개인정보 사고(유출·오남용·미동의 처리)가 없었다."
          evidence:
            q: "최근 12개월 개인정보 사고 건수"
            type: choice
            options:
              - { v: 1, label: "0건" }   # v=1이 좋은 케이스로 의도 — 점수 산출 시 reverse
              - { v: 2, label: "1건 (경미)" }
              - { v: 3, label: "1건 (중요)" }
              - { v: 4, label: "2건 이상" }
              - { v: 5, label: "현재 진행 중인 사고/조사" }
          citation: "방통위·KISA 개인정보 침해 사고 대응 가이드"
          failure_trigger: "evidence.v >= 2"     # 1건만 있어도 빨강
          cadence: monthly
          reverse_scoring: true     # 1=best, 5=worst
    - code: A7.NURI
      name: "누리과정 적합성"
      sub_items:
        - code: A7.NURI.FIT
          tier: important
