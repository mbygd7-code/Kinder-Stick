extension_guide: |
  현재 파일은 도메인당 평균 3-5개 sub-item만 담고 있다. 풀 셋 (~210개)으로
  확장할 때 각 도메인은 다음 sub-item을 추가해야 한다:

  A1 (시장-문제): A1.JTBD.PUSH, A1.SEG.ICP, A1.SEG.SIZE, A1.SEG.WTP, A1.PROBLEM.RESTATE
  A2 (PMF):       A2.SE.SEG (세그먼트별 SE40), A2.RET.M1, A2.RET.M6, A2.VALUE.ECHO, A2.NPS.ORG
  A3 (Buyer):     A3.BUYER.CYCLE (결제 사이클), A3.BUYER.RENEW (갱신율), A3.PRICE.ELAS
  A4 (Activation):A4.ACT.AHA (Aha moment 정의), A4.ACT.D7, A4.HABIT.LOOP, A4.RES.REACT (reactivation)
  A5 (Unit Eco):  A5.LTV.RATIO, A5.NRR (← A13과 매핑), A5.RULE40, A5.MAGIC
  A6 (GTM):       A6.CAC.CHANNEL, A6.PIPELINE.VEL, A6.CONTENT.CADENCE
  A7 (규제):      A7.CONSENT.PARENT, A7.CONTENT.CENSOR (콘텐츠 심의), A7.EVAL.FIT (평가제 매핑)
  A8 (Velocity):  A8.LEAD.TIME, A8.DECISION.LATENCY, A8.KILL.RATE
  A9 (AI):        A9.PROMPT.OPS, A9.HALL.GUARD, A9.LATENCY, A9.COST.PER.CALL
  A10 (M&S):      A10.PIPELINE.VEL, A10.CONTENT.CADENCE, A10.SDR.QUOTA
  A11 (Team):     A11.HIRING.PLAN, A11.CONFLICT.PROD, A11.TRUST.PSY
  A12 (Funding):  A12.PLAN.FORECAST (13주 cashflow 정확도), A12.MILESTONE.PROG
  A13 (CS):       A13.HEALTH.SCORE, A13.SLA.RESP, A13.CSAT, A13.CHURN.PRED
  A14 (Compete):  A14.MAP.REFRESH, A14.WATCH.NEW (잠재 진입자), A14.PRICE.MATCH

  각 sub-item은 code/tier/weight_within_group/belief/evidence/citation/failure_trigger/cadence를
  반드시 채울 것. weight_within_group의 합이 1.0이 되도록 조정.
