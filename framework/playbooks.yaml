  diagnostic_q: "웅진/교원/아이스크림이 지난 6개월 동안 우리 카테고리에서 무슨 시그널을 보냈나요?"
  smart_actions:
    - { owner: "PMM",     deadline_days: 7,  action: "competitive watchlist 5곳 (대형사 + 직접경쟁사) 정의" }
    - { owner: "PMM",     deadline_days: 14, action: "월 1회 watch report — 채용·보도자료·제품 변경 요약" }
    - { owner: "대표", deadline_days: 30, action: "대응 시나리오 3개 (대형사가 진입 시) 사전 작성" }
  verify:
    metric: "월 watch report 발행, 시나리오 문서화 완료"
    after_days: 30
  cite: "Porter Five Forces; Crayon competitive monitoring"

# =====================================================================
# Playbook 적용 가이드 (AI 코치용)
# =====================================================================
usage_for_ai_coaches: |
  1) Trigger 매칭: 코치는 KPI/진단 점수를 retrieve해서 trigger 조건에 매칭되는
     playbook을 찾는다. 복수 매칭 시 severity 높은 것 우선.

  2) 시스템 프롬프트 주입: 매칭된 playbook 1-3개를 코치 시스템 프롬프트에
     "예시 근거" 섹션으로 주입. 코치는 이를 보면서 사용자 회사의 실제
     상황(KPI 값, 단계, 인원수)에 맞춰 SMART 단계를 변형 출력한다.

  3) Hard rule: SMART 단계는 반드시 (owner / deadline / 측정 가능 행동)을
     포함해야 함. 코치 출력에 빠진 경우 서버 validator가 차단.

  4) external_handoff 필드가 있고 조건이 충족되면, 사용자에게 외부 AI
     자문 옵션을 제시 (수동 confirm 후 호출).

  5) verify 시점이 도래하면 follow-up cron이 metric을 자동 측정 → 충족
     시 [resolved], 미충족 시 escalation 또는 새 playbook 적용.
