# =====================================================================
# Kinder Stick OS — playbooks.yaml
# 42 Failure-Mode Coaching Playbooks (14 domains × 3 modes)
#
# 각 playbook은 AI 코치가 결손 감지 후 사용자와 대화할 때
# 진단 질문 → SMART 3단계 액션 → 검증 KPI로 이어지는 골격을 제공한다.
# Claude API 호출 시 (1) 사용자 컨텍스트 + KPI + 증거를 retrieve →
# (2) 가장 매칭되는 playbook을 1-shot으로 시스템 프롬프트에 주입 →
# (3) AI 코치가 회사 상황에 맞춰 변형 출력.
# =====================================================================

version: "1.0.0"
updated: "2026-05-07"

playbooks:

# =========================================================
# A1 — 시장-문제 적합성
# =========================================================
- id: F1-1
  domain: A1
  title: "Urgent 분류 부재 — 'Important하지만 사지 않는' 문제"
  trigger:
    primary: "A1.JTBD.URGENCY.evidence.v <= 2"
    secondary: ["last_purchase_decision_cycle > 90d", "win-rate trending down"]
  diagnostic_q: |
    최근 만난 교사 5명을 떠올려보세요. 그들이 우리 솔루션을 듣고 다음 학기에 직접 쓰겠다고 결정한 분이 몇 명인가요?
    결정 안 한 분들은 무엇을 더 급하다고 느끼고 있었나요?
  smart_actions:
    - { owner: "대표", deadline_days: 14, action: "도입 중단·미도입 교사 8명 1:1 인터뷰 — Mom Test §3 push/pull 질문 사용" }
    - { owner: "PM",      deadline_days: 21, action: "Push-Pull-Anxiety-Habit 매트릭스로 분류, 'urgent' 표현 추출" }
    - { owner: "대표", deadline_days: 30, action: "ICP를 'urgent 교사 케이스'로 좁힌 한 문장 가설 명문화 + 다음 30 deal에서 검증" }
  verify:
    metric: "A1.JTBD.URGENCY.evidence.v >= 3 AND 신규 deal cycle < 60d"
    after_days: 60
  cite: "Christensen *Competing Against Luck* (2016); Re:Wired Group 'Forces of Progress'; Fitzpatrick *The Mom Test*"

- id: F1-2
  domain: A1
  title: "세그먼트 흐려짐 — 모두에게 팔려고 한다"
  trigger:
    primary: "A1.SEG.ICP.evidence.v <= 2 OR active_segments > 3"
  diagnostic_q: "지난 분기 활성 교사 사용자 10명의 (지역·기관 유형·연차·담임 학급 규모)를 표로 그려보면, 가장 큰 클러스터가 전체의 몇 %를 차지하나요?"
  smart_actions:
    - { owner: "PM", deadline_days: 7,  action: "활성 교사 코호트 분석 — 가장 큰 클러스터 식별" }
    - { owner: "대표", deadline_days: 14, action: "ICP 한 문장 정의 (예: '서울·경기 사립 어린이집의 30대 4–7년차 담임 교사')" }
    - { owner: "Marketing", deadline_days: 30, action: "ICP 외 채널·광고·이벤트 비용 30% 컷, ICP에 재배분" }
  verify:
    metric: "ICP segment의 신규 결제율 +30%"
    after_days: 90
  cite: "April Dunford *Obviously Awesome* (2019)"

- id: F1-3
  domain: A1
  title: "인터뷰 부족 — 가설을 검증하지 못한 채 만들고 있다"
  trigger:
    primary: "A1.JTBD.LANG.evidence.v <= 2"
  diagnostic_q: "지난 30일 동안 잠재·활성·이탈 교사와 1:1 대화를 각각 몇 번 했나요?"
  smart_actions:
    - { owner: "대표", deadline_days: 7,  action: "다음 21일 안에 교사 8명 인터뷰 일정 잡기 — 활성·미도입·이탈 각 카테고리에서" }
    - { owner: "PM",      deadline_days: 21, action: "인터뷰 노트 텍스트 분석 — 동일 표현 빈도 카운트" }
    - { owner: "PM",      deadline_days: 30, action: "Top 3 표현으로 product copy 1차 재작성, A/B 테스트" }
  verify:
    metric: "동일 표현 빈도 ≥ 6/10 인터뷰"
    after_days: 30
  cite: "The Mom Test §2; Steve Blank *Four Steps to the Epiphany*"

# =========================================================
# A2 — PMF
# =========================================================
- id: F2-1
  domain: A2
  title: "핵심 세그먼트 미식별 — Sean Ellis 25–39%"
  trigger:
    primary: "A2.SE.40.evidence.v == 3"
    secondary: ["A2.CORE.ICP.evidence.v <= 3"]
  diagnostic_q: "Very disappointed라고 답한 사람들의 직무·기관 유형·사용 빈도가 다른 응답자와 다른 점은 무엇인가요?"
  smart_actions:
    - { owner: "PM",       deadline_days: 14, action: "VD 응답자 8명 1:1 인터뷰 (Mom Test 방식)" }
    - { owner: "대표",  deadline_days: 7,  action: "ICP 한 문장 재정의" }
    - { owner: "PM",       deadline_days: 21, action: "핵심 세그먼트 전용 onboarding 분기 A/B" }
  verify:
    metric: "핵심 세그먼트의 M1 retention >= 60%"
    after_days: 30
  cite: "Christensen JTBD interview script; Rob Fitzpatrick *Mom Test*"

- id: F2-2
  domain: A2
  title: "가치 명제 분산 — 사용자가 우리 단어로 안 말한다"
  trigger:
    primary: "A2.VALUE.ECHO.evidence.v <= 2"
  diagnostic_q: "사용자가 자기 입으로 가치를 말한 5개 quote 중 우리 마케팅 카피와 겹치는 단어는 몇 개인가요?"
  smart_actions:
    - { owner: "대표",  deadline_days: 7,  action: "최근 30일 NPS·인터뷰·고객지원 대화에서 30 quote 수집" }
    - { owner: "PMM",      deadline_days: 14, action: "Top-3 user-language phrase 도출" }
    - { owner: "Marketing", deadline_days: 21, action: "랜딩페이지 카피 전면 교체, 5초 테스트로 검증" }
  verify:
    metric: "신규 가입 funnel CVR +15%, value-prop comprehension test ≥ 80%"
    after_days: 30
  cite: "April Dunford *Obviously Awesome*; Wynter messaging tests"

- id: F2-3
  domain: A2
  title: "Retention 결손형 PMF — 가짜 PMF"
  trigger:
    primary: "A2.RET.M3.evidence.v <= 2 AND A2.SE.40.evidence.v >= 3"
    secondary: ["M1 retention 양호하지만 M3 급락"]
  diagnostic_q: "사용자들이 도구를 멈추는 시점에 그들이 풀려고 했던 일이 끝났는가요, 아니면 다른 방법으로 옮겨갔나요?"
  smart_actions:
    - { owner: "PM",  deadline_days: 7,  action: "최근 churn 30명 인터뷰 (이탈 사유)" }
    - { owner: "Product", deadline_days: 14, action: "weekly habit loop 1개 명시 (Hooked 모델)" }
    - { owner: "Eng", deadline_days: 30, action: "reactivation 트리거(이메일·푸시) 구현" }
  verify:
    metric: "M3 retention curve flatten (slope w8→w12 ≥ -1pp)"
    after_days: 60
  cite: "Andrew Chen 'leaky bucket'; Reforge Retention course; Eyal *Hooked*"

# =========================================================
# A3 — Buyer Economics
# =========================================================
- id: F3-1
  domain: A3
  title: "유료 전환 교사 0명 — 무료 사용은 늘어도 다음 학기 결정으로 안 이어짐"
  trigger:
    primary: "A3.BUYER.WTP.evidence.v == 1 AND stage IN [open_beta, ga_early]"
  diagnostic_q: "지난 6개월 동안 우리 제품을 무료로 쓰던 교사 중에 '다음 학기에도 쓰겠다'고 명시적으로 답했다가 결국 안 쓴 분이 몇 명인가요? 그분들이 든 이유는?"
  smart_actions:
    - { owner: "대표", deadline_days: 14, action: "다음 학기 의사 보였던 교사 5명 직접 인터뷰 — 막힌 지점 파악" }
    - { owner: "PMM",     deadline_days: 21, action: "교사 ROI 한 페이지 자료 작성 (주당 시간 절감·평가제 부합·학부모 소통 효율)" }
    - { owner: "대표", deadline_days: 30, action: "5명에게 paid pilot 제안 — 첫 유료 교사 만들기 (B2C 가격 또는 기관 결제 승인 동반)" }
  verify:
    metric: "유료 전환 교사 ≥ 3명"
    after_days: 60
  cite: "Patrick Campbell (ProfitWell) 'Pricing Strategy'"

- id: F3-2
  domain: A3
  title: "ROI 자료 부재 — 교사가 도입 근거를 스스로 만들지 못한다"
  trigger:
    primary: "A3.BUYER.ROI.evidence.v <= 2"
  diagnostic_q: "교사가 본인 또는 동료에게 우리 제품의 가치(시간 절감·학급 운영·학부모 소통)를 설명할 때 어떤 자료를 쓰나요?"
  smart_actions:
    - { owner: "PMM", deadline_days: 14, action: "활성 교사 5명 인터뷰 — '주당 몇 시간 절감되는지·어디서 절감되는지' 정량화" }
    - { owner: "PMM", deadline_days: 21, action: "교사 ROI 한 페이지 작성 (주당 X시간 절감 → 학급 운영·학부모 소통 시간으로 환산)" }
    - { owner: "Sales", deadline_days: 30, action: "다음 30 교사 도입 케이스에서 ROI 자료 사용, conversion 측정" }
  verify:
    metric: "도입 결정 사이클 -20% AND continuation intent +10%"
    after_days: 60
  cite: "Bessemer 'Five Cs of Cloud Finance' (교사 ROI 적용 버전)"

- id: F3-3
  domain: A3
  title: "Continuation 위기 — 학기 끝나면 교사가 계속 안 쓴다"
  trigger:
    primary: "renewal_rate < 70% AND domain_stage post-revenue"
  diagnostic_q: "지난 학기 계속 사용하지 않은 교사 5명에게 '왜 다음 학기에 안 쓰는지' 직접 들었나요?"
  smart_actions:
    - { owner: "CS",    deadline_days: 7,  action: "이탈 교사 5명 인터뷰" }
    - { owner: "Product", deadline_days: 21, action: "이탈 사유 Top 3 중 1개를 다음 분기 로드맵에 반영" }
    - { owner: "CS",    deadline_days: 30, action: "학기 종료 60일 전 교사 health check 자동 트리거 도입" }
  verify:
    metric: "다음 학기 continuation rate >= 85%"
    after_days: 90
  cite: "Bessemer NRR; Gainsight Customer Health Score"

# =========================================================
# A4 — Activation & Retention
# =========================================================
- id: F4-1
  domain: A4
  title: "D1 activation < 20% — 가입자가 첫날에 가치를 못 본다"
  trigger:
    primary: "A4.ACT.D1.evidence.v == 1"
  diagnostic_q: "신규 가입자가 우리 제품에서 처음 가치를 느끼는 'Aha moment'를 우리는 어떻게 정의하고 있나요? 그 정의가 데이터로 검증됐나요?"
  smart_actions:
    - { owner: "PM",    deadline_days: 7,  action: "Aha moment 정의 (예: '교사가 첫 활동 자료 1개 다운로드 + 학급 1개 등록')" }
    - { owner: "Eng",   deadline_days: 14, action: "활성화 funnel 이벤트 인스트루먼테이션" }
    - { owner: "PM",    deadline_days: 30, action: "onboarding 동선 3-step 단축, A/B 테스트" }
  verify:
    metric: "D1 activation >= 35%"
    after_days: 30
  cite: "Reforge Activation; First Round 'How Pinterest Increased Activation'"

- id: F4-2
  domain: A4
  title: "Habit Loop 부재 — WAU/MAU < 30%"
  trigger:
    primary: "A4.HABIT.WAU_MAU.evidence.v <= 2"
  diagnostic_q: "사용자가 우리 제품을 한 주에 몇 번, 어떤 트리거로 열어보길 기대하나요? 그게 실제 데이터에서 보이나요?"
  smart_actions:
    - { owner: "Product", deadline_days: 14, action: "habit loop 설계 (외부 트리거 → 행동 → 가변 보상 → 투자)" }
    - { owner: "Eng",     deadline_days: 21, action: "weekly digest 이메일 도입 (사용자 기관별 맞춤)" }
    - { owner: "PM",      deadline_days: 30, action: "weekly engagement 측정 대시보드 구축" }
  verify:
    metric: "WAU/MAU >= 40%"
    after_days: 60
  cite: "Eyal *Hooked* (2014); Sequoia engagement metric"

- id: F4-3
  domain: A4
  title: "이탈 후 재활성 부재 — 한 번 떠나면 끝"
  trigger:
    primary: "reactivation_rate < 5% AND churn cohort > 100/month"
  diagnostic_q: "이탈한 사용자에게 우리는 어떤 시점에 무엇을 보내고 있나요?"
  smart_actions:
    - { owner: "Marketing", deadline_days: 14, action: "이탈 후 7일·30일·90일 재활성 시퀀스 설계" }
    - { owner: "Eng",       deadline_days: 21, action: "이메일/푸시 자동화 구현" }
    - { owner: "PM",        deadline_days: 30, action: "재활성 메시지 A/B (가치 vs 인센티브)" }
  verify:
    metric: "reactivation rate >= 15%"
    after_days: 90
  cite: "Lenny Rachitsky 'Resurrected users'"

# =========================================================
# A5 — Unit Economics
# =========================================================
- id: F5-1
  domain: A5
  title: "Gross Margin < 50% — 인프라/CS 비용이 매출을 갉아먹는다"
  trigger:
    primary: "A5.GROSS.MARGIN.evidence.v <= 2 AND stage != pre_seed"
  diagnostic_q: "매출 1만원당 직접 원가(서버 + 결제수수료 + CS 인건비)는 얼마인가요? 가장 큰 항목은 무엇인가요?"
  smart_actions:
    - { owner: "CFO/CEO", deadline_days: 14, action: "COGS 항목별 분석 — 가장 큰 3개 식별" }
    - { owner: "CTO",     deadline_days: 30, action: "서버 비용 30% 절감 plan (instance rightsizing, caching, CDN)" }
    - { owner: "CS",      deadline_days: 30, action: "CS 자동화 — Top 5 inquiry self-serve 전환" }
  verify:
    metric: "Gross margin >= 65%"
    after_days: 90
  cite: "Bessemer State of the Cloud 2025"

- id: F5-2
  domain: A5
  title: "CAC payback > 24개월 — 광고 끄면 회사가 멈춘다"
  trigger:
    primary: "A5.CAC.PAYBACK.evidence.v == 1"
  diagnostic_q: "지난 분기 Net New ARR을 만든 채널 중 marginal CAC payback이 24개월 이상인 것은 무엇인가요?"
  smart_actions:
    - { owner: "CFO",     deadline_days: 7,  action: "채널별 CAC payback 분석" }
    - { owner: "Growth",  deadline_days: 14, action: "BM>3 채널 즉시 pause" }
    - { owner: "CEO",     deadline_days: 30, action: "efficient growth plan 재제출 (CAC payback 12개월 목표)" }
  verify:
    metric: "다음 분기 CAC payback <= 12개월"
    after_days: 90
  cite: "OpenView Efficient Growth; Sacks Burn Multiple"

- id: F5-3
  domain: A5
  title: "LTV:CAC < 3:1 — 고객 평생가치가 획득비용을 못 따라간다"
  trigger:
    primary: "A5.LTV.RATIO.evidence.v <= 2"
  diagnostic_q: "고객의 평균 수명(개월)과 월 ARPU를 곱한 LTV는 얼마인가요? 우리 CAC와 비교하면?"
  smart_actions:
    - { owner: "CS",        deadline_days: 30, action: "이탈 사유 분석 → top 1 사유 해결 (retention 연장)" }
    - { owner: "PM",        deadline_days: 30, action: "ARPU 확장 — upsell 기능 1개 출시" }
    - { owner: "Marketing", deadline_days: 30, action: "low-CAC 채널 (콘텐츠·SEO·referral) 비중 50%+ 확대" }
  verify:
    metric: "LTV:CAC >= 3:1"
    after_days: 90
  cite: "Bessemer 'LTV/CAC Cookbook'"

# =========================================================
# A6 — GTM
# =========================================================
- id: F6-1
  domain: A6
  title: "반복 가능 채널 0–1개 — 매번 새로 발명한다"
  trigger:
    primary: "A6.CHANNEL.REPEAT.evidence.v <= 2"
  diagnostic_q: "지난 6개월 동안 동일한 채널·동일한 메시지로 두 달 연속 신규 고객을 만든 적이 있나요?"
  smart_actions:
    - { owner: "Growth", deadline_days: 7,  action: "Bullseye Framework 19개 채널 중 우선순위 3개 선정" }
    - { owner: "Growth", deadline_days: 30, action: "3개 채널 각각 4주 실험 (실험 design, budget 동일)" }
    - { owner: "Growth", deadline_days: 60, action: "Winner 1개 double down — 60일간 비용 3배" }
  verify:
    metric: "1개 채널이 월 신규 고객의 30%+ 일관 공급"
    after_days: 90
  cite: "Weinberg & Mares *Traction* (2014); First Round 'How to Find Your Channel'"

- id: F6-2
  domain: A6
  title: "Pipeline Velocity 정체 — 리드는 들어오는데 안 닫힌다"
  trigger:
    primary: "deal_cycle_days > 60 AND stage_to_close_rate < 20%"
  diagnostic_q: "리드 → 데모 → 제안 → 클로즈 단계별 conversion이 어디서 막히나요?"
  smart_actions:
    - { owner: "Sales",   deadline_days: 14, action: "stage별 conversion 분석" }
    - { owner: "PMM",     deadline_days: 21, action: "막힌 stage용 자료 1개 작성 (예: ROI 자료, 케이스 스터디)" }
    - { owner: "Sales",   deadline_days: 30, action: "deal cycle 단축 — meeting cadence 격주→매주" }
  verify:
    metric: "deal cycle -25%, close rate +10%"
    after_days: 60
  cite: "Mark Roberge *The Sales Acceleration Formula*"

- id: F6-3
  domain: A6
  title: "콘텐츠 cadence 부재 — 마케팅 자산이 쌓이지 않는다"
  trigger:
    primary: "content_published_per_month < 2"
  diagnostic_q: "교사가 우리 브랜드 또는 관련 키워드를 검색했을 때 첫 페이지에 보이는 콘텐츠가 몇 개 있나요?"
  smart_actions:
    - { owner: "Marketing", deadline_days: 14, action: "콘텐츠 캘린더 — 주 1회 발행 (블로그 또는 영상)" }
    - { owner: "Marketing", deadline_days: 30, action: "SEO 키워드 30개 매핑 (누리과정·평가제·교사 업무 자동화 등)" }
    - { owner: "Marketing", deadline_days: 60, action: "교사 사례 인터뷰 시리즈 8편 발행" }
  verify:
